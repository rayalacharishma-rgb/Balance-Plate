<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Balance-Plate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="login">
  <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
    <div class="container">
      <a class="navbar-brand brand-logo" href="index.html"><i class="fas fa-leaf"></i> <span data-i18n="nav.brandAlt">Balance-Plate</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
          <li class="nav-item"><a class="nav-link" href="index.html" data-i18n="nav.home">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="login.html" data-i18n="nav.login">Login</a></li>
          <li class="nav-item"><a class="nav-link" href="register.html" data-i18n="nav.register">Register</a></li>
          <li class="nav-item">
            <button class="btn btn-theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="auth-page">
    <div class="container">
      <div class="auth-card animate-fade-in">
        <h2><i class="fas fa-right-to-bracket"></i> <span data-i18n="login.title">Login</span></h2>
        <p class="text-muted" data-i18n="login.subtitle">Sign in with username or email</p>
        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label class="form-label" data-i18n="login.with">Login with</label>
            <div class="btn-group w-100" role="group">
              <input type="radio" class="btn-check" name="loginType" id="loginUsername" value="username" checked>
              <label class="btn btn-outline-custom" for="loginUsername" data-i18n="login.username">Username</label>
              <input type="radio" class="btn-check" name="loginType" id="loginEmail" value="email">
              <label class="btn btn-outline-custom" for="loginEmail" data-i18n="login.email">Email</label>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label" id="loginIdLabel" data-i18n="login.username">Username</label>
            <input type="text" class="form-control" id="loginId" required>
            <div class="invalid-feedback" id="loginIdError"></div>
          </div>
          <div class="mb-3">
            <label class="form-label" data-i18n="login.password">Password</label>
            <input type="password" class="form-control" id="loginPassword" required>
            <div class="invalid-feedback" id="loginPasswordError"></div>
          </div>
          <div id="loginError" class="alert alert-danger d-none"></div>
          <button type="submit" class="btn btn-primary-custom w-100" data-i18n="login.submit">Login</button>
        </form>
        <p class="mt-3 text-center"><span data-i18n="login.newUser">New user?</span> <a href="register.html" data-i18n="login.registerLink">Register here</a></p>
        <div class="sample-credentials mt-3 p-3 rounded">
          <small><strong data-i18n="login.demo">Demo:</strong> demo_user / Demo@12345 or demo@balance-plate.com</small>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container text-center"><p data-i18n="footer.copyShort">&copy; 2026 Balance-Plate</p></div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/diet-data.js"></script>
  <script src="js/script.js"></script>
  <script src="js/integrate-features.js"></script>
</body>
</html>
