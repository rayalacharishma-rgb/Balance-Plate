<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Balance-Plate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="dashboard">
  <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
    <div class="container">
      <a class="navbar-brand brand-logo" href="index.html"><i class="fas fa-leaf"></i> <span data-i18n="nav.brandAlt">Balance-Plate</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
          <li class="nav-item"><a class="nav-link" href="index.html" data-i18n="nav.home">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="dietplans.html" data-i18n="nav.dietPlans">Diet Plans</a></li>
          <li class="nav-item"><a class="nav-link" href="workout.html" data-i18n="nav.workout">Workout Tracker</a></li>
          <li class="nav-item"><a class="nav-link active" href="dashboard.html" data-i18n="nav.dashboard">Dashboard</a></li>
          <li class="nav-item"><button class="btn btn-theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button></li>
          <li class="nav-item"><button class="btn btn-outline-custom btn-sm" id="logoutBtn" data-i18n="nav.logout">Logout</button></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="dashboard-page section-padding">
    <div class="container">
      <h1 class="section-title mb-4"><span data-i18n="dashboard.welcome">Welcome,</span> <span id="dashUsername">User</span>!</h1>

      <div class="row g-4">
        <!-- Profile Card -->
        <div class="col-lg-4">
          <div class="profile-card">
            <div class="profile-avatar"><i class="fas fa-user-circle"></i></div>
            <h3 id="profileUsername">—</h3>
            <ul class="profile-details">
              <li><strong data-i18n="dashboard.heightLabel">Height:</strong> <span id="profileHeight">—</span> m</li>
              <li><strong data-i18n="dashboard.weightLabel">Weight:</strong> <span id="profileWeight">—</span> kg</li>
              <li><strong data-i18n="dashboard.ageLabel">Age:</strong> <span id="profileAge">—</span></li>
              <li><strong data-i18n="dashboard.genderLabel">Gender:</strong> <span id="profileGender">—</span></li>
            </ul>
            <div class="bmi-display">
              <p class="bmi-value">BMI: <span id="profileBmi">—</span></p>
              <span id="profileHealthStatus" class="health-badge">—</span>
            </div>
          </div>
        </div>

        <!-- Diet Selection -->
        <div class="col-lg-8">
          <div class="dashboard-card">
            <h4><i class="fas fa-clipboard-list"></i> <span data-i18n="dashboard.personalizedDiet">Personalized Diet Plan</span></h4>
            <form id="dietSelectionForm" class="row g-3 mt-2">
              <div class="col-md-4">
                <label class="form-label" data-i18n="dashboard.healthCondition">Health Condition</label>
                <select id="healthCondition" class="form-select">
                  <option value="none" data-i18n="dashboard.healthNone">None / General</option>
                  <option value="diabetes" data-i18n="dashboard.healthDiabetes">Diabetes</option>
                  <option value="hypertension" data-i18n="dashboard.healthHypertension">Hypertension</option>
                  <option value="cholesterol" data-i18n="dashboard.healthCholesterol">High Cholesterol</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label" data-i18n="dashboard.weightGoal">Weight Goal</label>
                <select id="weightGoal" class="form-select">
                  <option value="maintain" data-i18n="dashboard.maintain">Maintain</option>
                  <option value="lose" data-i18n="dashboard.lose">Lose Weight</option>
                  <option value="gain" data-i18n="dashboard.gain">Gain Weight</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label" data-i18n="dashboard.fitnessGoal">Fitness Goal</label>
                <select id="fitnessGoal" class="form-select">
                  <option value="general" data-i18n="dashboard.fitnessGeneral">General Fitness</option>
                  <option value="muscle" data-i18n="dashboard.fitnessMuscle">Muscle Gain</option>
                  <option value="endurance" data-i18n="dashboard.fitnessEndurance">Endurance</option>
                  <option value="flexibility" data-i18n="dashboard.fitnessFlexibility">Flexibility</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label" data-i18n="dashboard.selectDiet">Select Diet Plan</label>
                <select id="dietPlanSelect" class="form-select"></select>
              </div>
              <div class="col-12">
                <button type="button" class="btn btn-primary-custom" id="recommendDietBtn" data-i18n="dashboard.recommendBtn">Get Recommendation</button>
                <a href="dietplans.html" class="btn btn-outline-custom ms-2" data-i18n="dashboard.viewPlans">View All Plans</a>
              </div>
            </form>
            <div id="recommendedPlan" class="mt-4"></div>
          </div>
        </div>
      </div>

      <!-- Quick Calculators on Dashboard -->
      <div class="row g-4 mt-2">
        <div class="col-md-4">
          <div class="calc-card mini">
            <h5 data-i18n="dashboard.bmiStatus">BMI Status</h5>
            <canvas id="bmiChart" height="120"></canvas>
          </div>
        </div>
        <div class="col-md-8">
          <div class="dashboard-card">
            <h5><i class="fas fa-bell"></i> <span data-i18n="dashboard.yourReminders">Your Reminders</span></h5>
            <div class="reminder-list" id="dashReminders"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container text-center"><p data-i18n="footer.copyShort">&copy; 2026 Balance-Plate</p></div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="js/diet-data.js"></script>
  <script src="js/script.js"></script>
  <script src="js/integrate-features.js"></script>
</body>
</html>
